<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Garden Pro 🌿</title>

<style>
:root {
  --bg: #f4fff4;
  --card: #ffffff;
  --text: #2e2e2e;
  --primary: #4caf50;
}

body.dark {
  --bg: #1e1e1e;
  --card: #2a2a2a;
  --text: #f0f0f0;
  --primary: #81c784;
}

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  text-align: center;
  transition: 0.3s;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: var(--card);
  border-radius: 16px;
  padding: 20px;
  margin-top: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

h1 {
  margin: 10px 0;
}

#timer {
  font-size: 52px;
  font-weight: bold;
  margin: 10px 0;
}

input {
  width: 80px;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  text-align: center;
}

button {
  margin: 5px;
  padding: 10px 16px;
  border: none;
  border-radius: 10px;
  background: var(--primary);
  color: white;
  cursor: pointer;
  font-size: 14px;
}

button:hover {
  opacity: 0.9;
}

.stats {
  font-size: 14px;
  margin-top: 10px;
}

#garden {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
  margin-top: 15px;
}

.plant {
  font-size: 26px;
  animation: grow 0.4s ease;
}

@keyframes grow {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="container">

  <h1>🌿 Focus Garden Pro</h1>

  <div class="card">
    <div id="timer">25:00</div>

    <div>
      ⏳ 时长：
      <input id="minutesInput" type="number" value="25"> 分钟
    </div>

    <div>
      <button onclick="startTimer()">开始</button>
      <button onclick="pauseTimer()">暂停</button>
      <button onclick="resetTimer()">重置</button>
    </div>

    <div class="stats" id="stats"></div>
  </div>

  <div class="card">
    <h3>🌱 我的花园</h3>
    <button onclick="clearGarden()">清空花园</button>
    <div id="garden"></div>
  </div>

</div>

<script>
let time = 25 * 60;
let timer = null;

let focusCount = 0;
let totalFocus = 0;
let streak = 0;

const plants = ["🌱","🌿","🌼","🌸","🌳","🌺","🍀"];

const timerEl = document.getElementById("timer");
const statsEl = document.getElementById("stats");
const gardenEl = document.getElementById("garden");

// 自动夜间模式
function setTheme() {
  const hour = new Date().getHours();
  if (hour >= 19 || hour < 6) {
    document.body.classList.add("dark");
  }
}
setTheme();

// 本地存储加载
function loadData() {
  const data = JSON.parse(localStorage.getItem("focusData"));
  if (!data) return;

  focusCount = data.focusCount || 0;
  totalFocus = data.totalFocus || 0;
  streak = data.streak || 0;

  data.garden?.forEach(p => {
    createPlant(p);
  });

  updateStats();
}
loadData();

// 保存
function saveData() {
  const garden = Array.from(document.querySelectorAll(".plant"))
    .map(p => p.textContent);

  localStorage.setItem("focusData", JSON.stringify({
    focusCount,
    totalFocus,
    streak,
    garden
  }));
}

function updateTimer() {
  let m = Math.floor(time / 60);
  let s = time % 60;
  timerEl.textContent =
    String(m).padStart(2,"0") + ":" +
    String(s).padStart(2,"0");
}

function updateStats() {
  statsEl.innerHTML = `
    今日：${focusCount} 次 |
    总计：${totalFocus} 次 |
    连续：🔥 ${streak}
  `;
}

function startTimer() {
  if (timer) return;

  const input = document.getElementById("minutesInput").value;
  if (time === 0) {
    time = input * 60;
  }

  timer = setInterval(() => {
    time--;
    updateTimer();

    if (time <= 0) {
      clearInterval(timer);
      timer = null;
      complete();
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(timer);
  timer = null;
}

function resetTimer() {
  clearInterval(timer);
  timer = null;
  const input = document.getElementById("minutesInput").value;
  time = input * 60;
  updateTimer();
}

function complete() {
  alert("专注完成！🌟");

  focusCount++;
  totalFocus++;
  streak++;

  addPlant();
  updateStats();
  saveData();

  resetTimer();
}

function addPlant() {
  const p = plants[Math.floor(Math.random()*plants.length)];
  createPlant(p);
}

function createPlant(p) {
  const el = document.createElement("div");
  el.className = "plant";
  el.textContent = p;
  gardenEl.appendChild(el);
}

function clearGarden() {
  gardenEl.innerHTML = "";
  saveData();
}

updateTimer();
updateStats();
</script>

</body>
</html>
